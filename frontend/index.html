<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO básico -->
    <title>CarCompare — Compare carros de forma inteligente</title>
    <meta name="description" content="Explore mais de 50 modelos, filtre por marca, categoria e combustível e compare carros lado a lado com especificações técnicas detalhadas." />
    <meta name="keywords" content="comparar carros, carros, comparação de veículos, especificações de carros, melhor carro" />
    <meta name="author" content="CarCompare" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CarCompare" />
    <meta property="og:title" content="CarCompare — Compare carros de forma inteligente" />
    <meta property="og:description" content="Explore mais de 50 modelos, filtre por marca, categoria e combustível e compare carros lado a lado." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CarCompare — Compare carros de forma inteligente" />
    <meta name="twitter:description" content="Explore mais de 50 modelos e compare carros lado a lado com especificações técnicas." />
    <meta name="twitter:image" content="/logo.png" />
    <!-- Aplica o tema antes do render para evitar flash -->
    <script>
      if (localStorage.getItem('tema') === 'dark' ||
         (!localStorage.getItem('tema') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
